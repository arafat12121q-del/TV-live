<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Hind Siliguri', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #001a10 0%, #00391f 100%);
    border-bottom: 2px solid var(--green);
    padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 30px rgba(0,106,78,0.4);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-flag { width: 40px; height: 26px; background: var(--green); border-radius: 3px; position: relative; overflow: hidden; flex-shrink: 0; }
  .logo-flag::after { content: ''; position: absolute; width: 16px; height: 16px; background: var(--red); border-radius: 50%; top: 50%; left: 52%; transform: translate(-50%, -50%); }
  .logo-text { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .logo-text span { color: var(--red); }
  .live-badge { background: var(--red); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 3px; letter-spacing: 2px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .channel-count { color: var(--muted); font-size: 13px; }

  .categories { background: #0c1610; border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .categories::-webkit-scrollbar { display: none; }
  .cat-btn { background: none; border: none; color: var(--muted); font-family: inherit; font-size: 13px; font-weight: 600; padding: 12px 16px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .cat-btn:hover { color: var(--text); }
  .cat-btn.active { color: #4fffb0; border-bottom-color: #4fffb0; }

  .player-section { background: #000; position: relative; }
  .player-wrap { max-width: 900px; margin: 0 auto; padding: 16px 16px 0; }
  .player-frame { width: 100%; aspect-ratio: 16/9; background: #050f08; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 0 40px var(--glow); }
  .player-frame iframe, .player-frame video { width: 100%; height: 100%; border: none; display: block; }
  .player-info { max-width: 900px; margin: 0 auto; padding: 10px 16px 14px; display: flex; align-items: center; justify-content: space-between; }
  .now-playing { display: flex; align-items: center; gap: 10px; }
  .now-playing-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: pulse 1s infinite; }
  .now-playing-name { font-size: 16px; font-weight: 700; color: #fff; }
  .now-playing-cat { font-size: 12px; color: var(--muted); }

  main { padding: 16px; max-width: 1200px; margin: 0 auto; }
  .section-title { font-size: 15px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }

  .ch-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; cursor: pointer; transition: all 0.2s; text-align: center; position: relative; overflow: hidden; }
  .ch-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(0,106,78,0.08)); opacity: 0; transition: opacity 0.2s; }
  .ch-card:hover::before { opacity: 1; }
  .ch-card:hover { border-color: var(--green); transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow); }
  .ch-card.active { border-color: #4fffb0; background: #0d2018; box-shadow: 0 0 20px rgba(79,255,176,0.2); }
  .ch-card.active::after { content: '▶'; position: absolute; top: 6px; right: 8px; font-size: 9px; color: #4fffb0; }

  .ch-logo { width: 64px; height: 40px; object-fit: contain; margin: 0 auto 8px; display: block; border-radius: 4px; background: #1a2820; padding: 4px; }
  .ch-icon { font-size: 26px; margin-bottom: 8px; display: block; line-height: 1; }
  .ch-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .ch-type { font-size: 10px; color: var(--muted); margin-top: 3px; }

  footer { background: #060e09; border-top: 1px solid var(--border); padding: 20px; text-align: center; color: var(--muted); font-size: 12px; }
  footer span { color: var(--red); }

  @media (max-width: 600px) {
    .logo-text { font-size: 18px; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .ch-card { padding: 8px 5px; }
    .ch-logo { width: 48px; height: 32px; }
    .ch-icon { font-size: 20px; }
    .ch-name { font-size: 10px; }
  }

  .no-video { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
  .no-video-icon { font-size: 48px; }
  .no-video-text { font-size: 16px; font-weight: 600; }
  .no-video-sub { font-size: 13px; }
</style>

let currentCat = 'all';
let activeCard = null;
let currentHls = null;

const catLabels = {
  news: '📰 নিউজ',
  entertainment: '🎭 বিনোদন',
  sports: '⚽ স্পোর্টস',
  movies: '🎬 মুভিজ',
  islamic: '🕌 ইসলামিক',
  kids: '👶 শিশু',
  music: '🎵 মিউজিক',
  infotainment: '🌍 ইনফো',
  international: '🌐 ইন্টারন্যাশনাল স্পোর্টস',
};

function buildGrid() {
  const filtered = currentCat === 'all' ? channels : channels.filter(c => c.cat === currentCat);
  const catMap = {};
  filtered.forEach(ch => {
    if (!catMap[ch.cat]) catMap[ch.cat] = [];
    catMap[ch.cat].push(ch);
  });

  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  for (const cat in catMap) {
    const section = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = catLabels[cat] || cat;
    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';

    catMap[cat].forEach(ch => {
      const card = document.createElement('div');
      card.className = 'ch-card';
      const imgOrIcon = ch.logo
        ? `<img class="ch-logo" src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
          + `<span class="ch-icon" style="display:none">${ch.icon}</span>`
        : `<span class="ch-icon">${ch.icon}</span>`;
      card.innerHTML = `
        ${imgOrIcon}
        <div class="ch-name">${ch.name}</div>
        <div class="ch-type">${catLabels[ch.cat] || ch.cat}</div>
      `;
      card.addEventListener('click', () => playChannel(ch, card));
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  }

  document.getElementById('chCount').textContent = channels.length + '+ চ্যানেল';
}

function playChannel(ch, card) {
  if (activeCard) activeCard.classList.remove('active');
  card.classList.add('active');
  activeCard = card;

  document.getElementById('playingName').textContent = ch.name;
  document.getElementById('playingCat').textContent = catLabels[ch.cat] || ch.cat;

  const frame = document.getElementById('playerFrame');

  if (currentHls) { currentHls.destroy(); currentHls = null; }

  if (ch.m3u8) {
    frame.innerHTML = `<video id="hlsVideo" controls autoplay playsinline style="width:100%;height:100%;background:#000;"></video>`;
    const video = document.getElementById('hlsVideo');
    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker: false });
      currentHls = hls;
      hls.loadSource(ch.m3u8);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
          frame.innerHTML = `<div class="no-video"><div class="no-video-icon">⚠️</div><div class="no-video-text">স্ট্রিম লোড হয়নি</div><div class="no-video-sub">চ্যানেলটি বর্তমানে অফলাইন হতে পারে</div></div>`;
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = ch.m3u8;
      video.play().catch(()=>{});
    }
  } else if (ch.ytId) {
    frame.innerHTML = `<iframe src="https://www.youtube.com/embed/live_stream?channel=${ch.ytId}&autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
  }

  document.querySelector('.player-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildGrid();
}

buildGrid();
</script>
