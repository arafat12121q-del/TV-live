let channels = [];
let groups = [];
let activeGroup = "সব";
let hls = null;

const loader = document.getElementById('loader');
const loaderPct = document.getElementById('loaderPct');
const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const searchInput = document.getElementById('searchInput');
const emptyState = document.getElementById('emptyState');
const errorState = document.getElementById('errorState');
const sectionTitle = document.getElementById('sectionTitle');
const video = document.getElementById('video');
const placeholder = document.getElementById('placeholder');
const nowPlaying = document.getElementById('nowPlaying');

function parseM3U(text){
  const lines = text.split(/\r?\n/);
  const list = [];
  let current = null;
  for(const raw of lines){
    const line = raw.trim();
    if(!line) continue;
    if(line.startsWith('#EXTINF')){
      const logoMatch = line.match(/tvg-logo="([^"]*)"/);
      const groupMatch = line.match(/group-title="([^"]*)"/);
      // Channel name follows the LAST comma (attribute values, like some
      // logo URLs, can themselves contain commas and break a first-comma split)
      const lastComma = line.lastIndexOf(',');
      const name = lastComma !== -1 ? line.slice(lastComma + 1).trim() : "Unknown Channel";
      current = {
        logo: logoMatch ? logoMatch[1] : FALLBACK_LOGO,
        group: groupMatch ? groupMatch[1] : "অন্যান্য",
        name: name || "Unknown Channel",
        url: ""
      };
    } else if(line.startsWith('#')) {
      // skip other tags
    } else if(current){
      current.url = line;
      list.push(current);
      current = null;
    }
  }
  return list;
}

function buildGroups(){
  const set = new Set(channels.map(c => c.group || "অন্যান্য"));
  groups = ["সব", ...Array.from(set)];
}

function renderTabs(){
  tabsEl.innerHTML = "";
  groups.forEach(g => {
    const el = document.createElement('div');
    el.className = 'tab' + (g === activeGroup ? ' active' : '');
    el.textContent = g;
    el.onclick = () => { activeGroup = g; searchInput.value=''; renderTabs(); renderGrid(); };
    tabsEl.appendChild(el);
  });
}

function renderGrid(){
  const q = searchInput.value.trim().toLowerCase();
  let list = channels;
  if(activeGroup !== "সব") list = list.filter(c => c.group === activeGroup);
  if(q) list = list.filter(c => c.name.toLowerCase().includes(q));

  sectionTitle.textContent = activeGroup + " (" + list.length + ")";
  grid.innerHTML = "";

  if(list.length === 0){
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const frag = document.createDocumentFragment();
  list.forEach(ch => {
    const card = document.createElement('div');
    card.className = 'chan-card' + (currentChannel === ch ? ' playing' : '');
    card.innerHTML = `<img src="${ch.logo}" onerror="this.src='${FALLBACK_LOGO}'" loading="lazy">
      <div class="cname">${escapeHtml(ch.name)}</div>`;
    card.onclick = () => playChannel(ch);
    frag.appendChild(card);
  });
  grid.appendChild(frag);
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

let currentChannel = null;
let stallTimer = null;
let watchdogTimer = null;
let lastProgressTime = 0;
let lastCurrentTime = -1;
let networkRetryCount = 0;
let mediaRetryCount = 0;
const MAX_AUTO_RETRIES = 4;

const bufferOverlay = document.getElementById('bufferOverlay');
const bufferText = document.getElementById('bufferText');
const retryBtn = document.getElementById('retryBtn');

function showBuffer(msg, showRetry){
  bufferText.textContent = msg || "বাফারিং হচ্ছে...";
  bufferOverlay.classList.add('show');
  retryBtn.classList.toggle('show', !!showRetry);
}
function hideBuffer(){
  bufferOverlay.classList.remove('show');
  retryBtn.classList.remove('show');
}

retryBtn.addEventListener('click', () => {
  if(currentChannel) playChannel(currentChannel);
});

function clearWatchdog(){
  if(stallTimer){ clearTimeout(stallTimer); stallTimer = null; }
  if(watchdogTimer){ clearInterval(watchdogTimer); watchdogTimer = null; }
}

function startWatchdog(){
  clearWatchdog();
  lastCurrentTime = -1;
  lastProgressTime = Date.now();
  // Checks every 5s whether playback time is actually advancing.
  // If stuck (frozen picture / silently hung) for too long, force a reconnect.
  watchdogTimer = setInterval(() => {
    if(video.paused || video.ended) return;
    if(video.currentTime !== lastCurrentTime){
      lastCurrentTime = video.currentTime;
      lastProgressTime = Date.now();
      return;
    }
    const stuckFor = Date.now() - lastProgressTime;
    if(stuckFor > 12000){
      console.warn('Playback appears stuck, forcing reconnect');
      forceReconnect("চ্যানেলটি আটকে গিয়েছিল, আবার সংযোগ করা হচ্ছে...");
    }
  }, 5000);
}

function forceReconnect(msg){
  if(!currentChannel) return;
  clearWatchdog();
  showBuffer(msg || "সংযোগ পুনরায় স্থাপন করা হচ্ছে...", false);
  const ch = currentChannel;
  setTimeout(() => {
    if(currentChannel === ch) playChannel(ch, true);
  }, 500);
}

function playChannel(ch, isReconnect){
  currentChannel = ch;
  if(!isReconnect){
    networkRetryCount = 0;
    mediaRetryCount = 0;
  }
  placeholder.style.display = 'none';
  nowPlaying.style.display = 'flex';
  hideBuffer();
  document.getElementById('npImg').src = ch.logo;
  document.getElementById('npImg').onerror = function(){ this.src = FALLBACK_LOGO; };
  document.getElementById('npName').textContent = ch.name;
  document.getElementById('npGroup').textContent = ch.group;

  clearWatchdog();
  if(hls){ hls.destroy(); hls = null; }
  video.oncanplay = null;
  video.onwaiting = null;
  video.onplaying = null;
  video.onstalled = null;
  video.onerror = null;

  video.onwaiting = () => showBuffer("বাফারিং হচ্ছে...", false);
  video.onplaying = () => { hideBuffer(); startWatchdog(); };
  video.onstalled = () => showBuffer("সংযোগ ধীর হচ্ছে, অপেক্ষা করুন...", false);

  if(ch.url.endsWith('.mpd')){
    video.src = ch.url;
    video.onerror = () => showBuffer("এই চ্যানেলটি এখন চালানো যাচ্ছে না।", true);
    video.play().catch(()=>{});
  } else if(Hls.isSupported()){
    hls = new Hls({
      maxBufferLength: 30,
      liveSyncDuration: 12,
      liveMaxLatencyDuration: 20,
      manifestLoadingMaxRetry: 4,
      levelLoadingMaxRetry: 4,
      fragLoadingMaxRetry: 6
    });
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR, (evt, data) => {
      console.warn('HLS error', data.type, data.details, 'fatal:', data.fatal);
      if(!data.fatal) return;

      if(data.type === Hls.ErrorTypes.NETWORK_ERROR){
        networkRetryCount++;
        if(networkRetryCount <= MAX_AUTO_RETRIES){
          showBuffer(`নেটওয়ার্ক সমস্যা, পুনরায় চেষ্টা হচ্ছে... (${networkRetryCount}/${MAX_AUTO_RETRIES})`, false);
          setTimeout(() => { try{ hls.startLoad(); }catch(e){} }, 1500);
        } else {
          showBuffer("সংযোগ করা যাচ্ছে না। আবার চেষ্টা করতে নিচে ট্যাপ করুন।", true);
        }
      } else if(data.type === Hls.ErrorTypes.MEDIA_ERROR){
        mediaRetryCount++;
        if(mediaRetryCount <= MAX_AUTO_RETRIES){
          showBuffer("প্লেব্যাক সমস্যা সারানো হচ্ছে...", false);
          try{ hls.recoverMediaError(); }catch(e){ forceReconnect(); }
        } else {
          showBuffer("এই চ্যানেলে সমস্যা হচ্ছে। আবার চেষ্টা করতে নিচে ট্যাপ করুন।", true);
        }
      } else {
        showBuffer("চ্যানেল লোড করা যায়নি। আবার চেষ্টা করতে নিচে ট্যাপ করুন।", true);
      }
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = ch.url;
    video.addEventListener('loadedmetadata', () => video.play().catch(()=>{}));
    video.onerror = () => showBuffer("এই চ্যানেলটি এখন চালানো যাচ্ছে না।", true);
  } else {
    alert('আপনার ব্রাউজার এই স্ট্রিম সাপোর্ট করে না।');
  }

  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

searchInput.addEventListener('input', renderGrid);

function hideLoader(){
  loader.classList.add('hide');
}

function loadEmbedded(){
  channels = EMBEDDED_CHANNELS;
  buildGroups();
  renderTabs();
  renderGrid();
  loaderPct.textContent = "প্রস্তুত!";
  setTimeout(hideLoader, 500);
}

async function init(){
  loaderPct.textContent = "চ্যানেল লোড হচ্ছে...";
  loadEmbedded();
  // Note: we intentionally do NOT auto-fetch and swap in the full raw playlist here.
  // That playlist contains hundreds of dead/test/geo-blocked links (many Kids/test
  // entries with generic placeholder logos) which caused constant freezing and
  // manifestLoadError/manifestParsingError loops. The curated list above is
  // hand-picked to stay reliable.
}

document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && currentChannel && video.paused){
    // Screen was likely locked/backgrounded — reconnect the live stream instead of
    // resuming a now-stale buffer, which is what usually shows as "stuck".
    forceReconnect("আবার চালু করা হচ্ছে...");
  }
});

init();
</script>
</body>
