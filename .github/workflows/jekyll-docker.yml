<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BD Live TV — সরাসরি টিভি চ্যানেল</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<style>
  :root{
    --bg:#0a0e17;
    --bg2:#111827;
    --card:#161d2e;
    --accent:#00e0a8;
    --accent2:#ff3d6e;
    --text:#eef2f7;
    --muted:#8b94a8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', 'Noto Sans Bengali', sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
  }

  /* ---------- LOADING SCREEN ---------- */
  #loader{
    position:fixed; inset:0; z-index:9999;
    background:radial-gradient(circle at 50% 40%, #10192c 0%, #05070c 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #loader.hide{ opacity:0; visibility:hidden; }
  .logo-wrap{
    position:relative;
    width:140px; height:140px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:28px;
  }
  .logo-ring{
    position:absolute; inset:0;
    border-radius:50%;
    border:3px solid transparent;
    border-top-color:var(--accent);
    border-right-color:var(--accent2);
    animation:spin 1.1s linear infinite;
  }
  .logo-ring.r2{
    inset:14px;
    border-top-color:var(--accent2);
    border-right-color:transparent;
    border-bottom-color:var(--accent);
    animation:spin 1.6s linear infinite reverse;
    opacity:.8;
  }
  .logo-core{
    width:78px; height:78px;
    border-radius:50%;
    background:linear-gradient(145deg,#0e1424,#1c2540);
    display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:800;
    color:var(--accent);
    box-shadow:0 0 30px rgba(0,224,168,.35), inset 0 0 15px rgba(0,224,168,.15);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes pulse{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.07);} }
  .loader-title{
    font-size:22px; font-weight:800; letter-spacing:1px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:6px;
  }
  .loader-sub{ color:var(--muted); font-size:13.5px; margin-bottom:22px; text-align:center; padding:0 20px;}
  .loader-bar{
    width:220px; height:5px; border-radius:6px;
    background:#1b2337; overflow:hidden; position:relative;
  }
  .loader-bar span{
    position:absolute; top:0; left:0; height:100%; width:40%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:6px;
    animation:loadmove 1.2s ease-in-out infinite;
  }
  @keyframes loadmove{
    0%{ left:-40%; }
    100%{ left:100%; }
  }
  .loader-pct{ margin-top:10px; font-size:12px; color:var(--muted); }

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(10,14,23,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid #1c2536;
    padding:12px 16px;
    display:flex; align-items:center; gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .brand-badge{
    width:36px; height:36px; border-radius:10px;
    background:linear-gradient(145deg,var(--accent),#00a37e);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; color:#04120d; font-size:16px;
  }
  .brand h1{ font-size:16px; font-weight:800; }
  .brand small{ color:var(--muted); font-size:11px; display:block; }
  .search-wrap{ flex:1; position:relative; }
  #searchInput{
    width:100%; padding:10px 14px 10px 36px; border-radius:10px;
    border:1px solid #232c42; background:var(--bg2); color:var(--text);
    font-size:14px; outline:none;
  }
  #searchInput:focus{ border-color:var(--accent); }
  .search-icon{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px;}
  .tg-btn{
    flex-shrink:0; display:flex; align-items:center; gap:6px;
    background:#229ed9; color:#fff; text-decoration:none;
    padding:9px 14px; border-radius:10px; font-size:13px; font-weight:700;
    white-space:nowrap;
  }

  /* ---------- CATEGORY TABS ---------- */
  #tabs{
    display:flex; gap:8px; overflow-x:auto; padding:10px 14px;
    background:var(--bg2); border-bottom:1px solid #1c2536;
    scrollbar-width:none;
  }
  #tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex-shrink:0; padding:7px 14px; border-radius:20px;
    background:var(--card); color:var(--muted); font-size:12.5px; font-weight:600;
    cursor:pointer; border:1px solid #232c42; white-space:nowrap;
    transition:.2s;
  }
  .tab.active{ background:var(--accent); color:#04120d; border-color:var(--accent); }

  /* ---------- PLAYER ---------- */
  #playerSection{ padding:14px; }
  .player-box{
    position:relative; width:100%; aspect-ratio:16/9; background:#000;
    border-radius:14px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.5);
    border:1px solid #1c2536;
  }
  .player-box video{ width:100%; height:100%; object-fit:contain; background:#000; }
  .player-placeholder{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; color:var(--muted); gap:10px; text-align:center; padding:20px;
  }
  .player-placeholder .big{ font-size:40px; }
  .buffer-overlay{
    position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:12px; background:rgba(5,7,12,.72); backdrop-filter:blur(2px); z-index:5;
  }
  .buffer-overlay.show{ display:flex; }
  .buffer-spin{
    width:38px; height:38px; border-radius:50%;
    border:3px solid rgba(255,255,255,.15); border-top-color:var(--accent);
    animation:spin 0.9s linear infinite;
  }
  .buffer-text{ font-size:12.5px; color:var(--muted); }
  .retry-btn{
    margin-top:4px; padding:8px 18px; border-radius:20px; border:none;
    background:var(--accent); color:#04120d; font-weight:800; font-size:12.5px;
    cursor:pointer; display:none;
  }
  .retry-btn.show{ display:inline-block; }
  .now-playing{
    display:flex; align-items:center; gap:10px; margin-top:10px; padding:0 4px;
  }
  .now-playing img{ width:34px; height:34px; border-radius:8px; object-fit:cover; background:#1c2536; }
  .now-playing .npname{ font-weight:700; font-size:14.5px; }
  .now-playing .npgroup{ font-size:11.5px; color:var(--muted); }
  .live-dot{
    display:inline-flex; align-items:center; gap:5px; font-size:10.5px; font-weight:800;
    color:var(--accent2); margin-left:auto; background:rgba(255,61,110,.12);
    padding:4px 9px; border-radius:20px;
  }
  .live-dot i{ width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:blink 1s infinite; }
  @keyframes blink{ 50%{ opacity:.2; } }

  /* ---------- CHANNEL GRID ---------- */
  #channelSection{ padding:0 14px 30px; }
  .section-title{ font-size:14px; font-weight:700; margin:14px 0 10px; color:var(--muted); }
  #grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:10px;
  }
  .chan-card{
    background:var(--card); border:1px solid #1e2740; border-radius:12px;
    padding:10px 6px 8px; display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer; transition:.15s; text-align:center;
  }
  .chan-card:active{ transform:scale(.96); }
  .chan-card.playing{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .chan-card img{
    width:48px; height:48px; border-radius:10px; object-fit:cover; background:#0e1424;
  }
  .chan-card .cname{ font-size:11px; font-weight:600; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  #emptyState{ text-align:center; color:var(--muted); padding:40px 10px; font-size:13px; display:none; }
  #errorState{ text-align:center; color:var(--accent2); padding:40px 10px; font-size:13px; display:none; }

  footer{
    text-align:center; padding:18px; color:var(--muted); font-size:11.5px; border-top:1px solid #1c2536;
  }
  footer a{ color:var(--accent); text-decoration:none; }
</style>
</head>
<body>

<!-- ===================== LOADING SCREEN ===================== -->
<div id="loader">
